name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type and Svelte checks
        run: npm run check

      - name: Typed unused/dead export lint
        run: npm run lint:types

      - name: Unit tests
        run: npm test -- --run

      - name: Export quality gate
        run: npm run lint:export

      - name: Local GitHub release readiness
        run: npm run verify:release

      - name: Handoff validation
        run: npm run validate:handoff

      - name: Production build and bundle budget
        run: npm run build:budget

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Browser smoke tests
        run: npm run test:e2e:smoke -- --reporter=github

      - name: Upload Playwright smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-smoke
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  full-regression:
    name: Full browser regression
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Browser regression tests
        run: npm run test:e2e -- --reporter=github

      - name: Upload Playwright regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-full-regression
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
